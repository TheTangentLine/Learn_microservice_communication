version: "3.8"
services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory:
    build: ./inventory
    depends_on:
      rabbitmq:
        condition: service_healthy

  order:
    build: ./order
    depends_on:
      rabbitmq:
        condition: service_healthy

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    depends_on:
      - order